set -g @batt_color_charge_primary_tier3 'Orange2'
set -g @batt_color_charge_primary_tier2 'Red2'
set -g @batt_color_charge_primary_tier1 'Red2'

set -g @batt_color_status_primary_charging 'SteelBlue1'
