
# -- general -------------------------------------------------------------------

set-option -g default-command "reattach-to-user-namespace -l $SHELL"

set -s escape-time 50
set-option -g prefix C-a
bind-key a send-prefix

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."


# -- display -------------------------------------------------------------------

set -g default-terminal "screen-256color"

set -g base-index 1				# start windows numbering at 1
setw -g pane-base-index 1		# make pane numbering consistent with windows

setw -g automatic-rename on		# don't rename windows automatically
set -g renumber-windows on		# renumber windows when a window is closed

set -g set-titles on			# set terminal title


# -- navigation ----------------------------------------------------------------

# mouse
set -g mouse on

# split current window horizontally
unbind %
bind - split-window -v
# split current window vertically
unbind '"'
bind | split-window -h

# pane navigation
bind -r h select-pane -L	# move left
bind -r j select-pane -D	# move down
bind -r k select-pane -U	# move up
bind -r l select-pane -R	# move right
bind > swap-pane -D			# swap current pane with the next one
bind < swap-pane -U			# swap current pane with the previous one
# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
unbind n
unbind p
bind -r C-h previous-window		# select previous window
bind -r C-l next-window			# select next window


# -- status --------------------------------------------------------------------

set -g status-interval 1
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# layout
set -g status-position top
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 50

set -g status-left '#{prefix_highlight} '

set -g status-right ' \
	#[fg=BrightBlack]ŅéČ#[bg=BrightBlack fg=White]#{online_status}#[fg=BrightBlack bg=color234]Ņé┤#[default] \
	#[fg=BrightBlack]ŅéČ#{battery_color_fg}#[bg=BrightBlack]#{battery_icon} #{battery_percentage}#[fg=BrightBlack bg=color234]Ņé┤#[default] \
	#[fg=BrightBlack]ŅéČ#[bg=BrightBlack fg=White]%a %h-%d %H:%M '

setw -g window-status-current-format	'#[bg=color234 fg=LightGoldenrod2]ŅéČ\
										#[fg=color234 bg=LightGoldenrod2]#I \
										#[default] #W\
										#[bg=color234 fg=BrightBlack]Ņé┤'
setw -g window-status-format	'#[bg=color234 fg=BrightBlack]ŅéČ\
								#[fg=White bg=BrightBlack]#I \
								#[default] #W\
								#[bg=color234 fg=BrightBlack]Ņé┤'

# styling
set -g status-style 'bg=color234 fg=White'
setw -g window-status-current-style 'bg=BrightBlack fg=LightGoldenrod2 bold'
setw -g window-status-style 'bg=BrightBlack fg=White'


# -- plugin config -------------------------------------------------------------

# tmux-plugins/tmux-resurrect
set -g @resurrect-dir '~/.config/tmux/resurrect'

# tmux-plugins/tmux-prefix-highlight
set -g @prefix_highlight_empty_has_affixes 'on'
set -g @prefix_highlight_show_copy_mode    'on'
set -g @prefix_highlight_show_sync_mode    'on'

set -g @prefix_highlight_empty_prompt  '’äĀ #S#[bg=color234 fg=BrightBlack]'
set -g @prefix_highlight_prefix_prompt '¾░”© #S#[bg=color234 fg=SteelBlue1]'
set -g @prefix_highlight_copy_prompt   '¾░åÅ #S#[bg=color234 fg=LightGoldenrod2]'
set -g @prefix_highlight_sync_prompt   'Ņ®Ę #S#[bg=color234 fg=Green3]'

set -g @prefix_highlight_output_prefix ' '
set -g @prefix_highlight_output_suffix 'Ņé┤'

set -g @prefix_highlight_fg 'Black'
set -g @prefix_highlight_bg 'SteelBlue1'
set -g @prefix_highlight_empty_attr 'fg=White bg=BrightBlack'
set -g @prefix_highlight_copy_mode_attr 'fg=Black bg=LightGoldenrod2'
set -g @prefix_highlight_sync_mode_attr 'fg=Black bg=Green3'

# tmux-plugins/tmux-battery
set -g @batt_color_charge_primary_tier8 'SteelBlue1'
set -g @batt_color_charge_primary_tier7 'Green3'
set -g @batt_color_charge_primary_tier6 'Green3'
set -g @batt_color_charge_primary_tier5 'Green3'
