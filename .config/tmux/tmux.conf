set -g @batt_icon_charge_tier8 '’ēĆ '
set -g @batt_icon_charge_tier7 '’ēü '
set -g @batt_icon_charge_tier6 '’ēü '
set -g @batt_icon_charge_tier5 '’ēé '
set -g @batt_icon_charge_tier4 '’ēé '
set -g @batt_icon_charge_tier3 '’ēā '
set -g @batt_icon_charge_tier2 '’ēā '
set -g @batt_icon_charge_tier1 '’ēä '

set -g @batt_icon_status_unknown     '’üÖ '
set -g @batt_icon_status_attached    '¾░Üź '
set -g @batt_icon_status_charging    '¾▒Éŗ '
set -g @batt_icon_status_charged     '  '
set -g @batt_icon_status_discharging '  '

# tmux-plugins/tmux-online-status
set -g @online_icon  '#[fg=SteelBlue1]’ć½ '
set -g @offline_icon '#[fg=Red2]’ć½ '

# sainnhe/tmux-fzf
TMUX_FZF_LAUNCH_KEY="C-f"

# -- plugins -------------------------------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
